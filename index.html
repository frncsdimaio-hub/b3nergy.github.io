<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B3nergy – Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background-color: #ffffff;
      font-family: 'Work Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .container {
      display: flex; flex-direction: column;
      align-items: center; gap: 2rem;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .logo-area img {
      width: 220px;
      height: auto;
      object-fit: contain;
    }
    .divider {
      width: 50px; height: 2px;
      background: linear-gradient(90deg, #22c55e, #facc15);
      border-radius: 2px;
    }
    .coming-soon {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: clamp(2.8rem, 2rem + 4vw, 6rem);
      color: #2d2d2d;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .coming-soon span {
      background: linear-gradient(135deg, #22c55e 0%, #4ade80 50%, #facc15 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      font-size: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.7;
      max-width: 38ch;
    }
    footer {
      position: fixed; bottom: 1.5rem;
      font-size: 0.7rem; color: #bbb;
      letter-spacing: 0.07em; text-transform: uppercase;
      font-family: 'Work Sans', sans-serif;
    }
  </style>
</head>
